<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="5">
        <tr>
        
            <td colspan="2">
                <center>
                <h1>
                    PERSON PROFILE
                </h1>
                </center>
                
            </td>
         
        </tr>
        <tr>
            <td>
                Name
            </td>
            <td>
                 <input type="text" name="name"><br>
            </td>
        </tr>
        <tr>
            <td>
                Email
            </td>
            <td>
                <input type="text" name="Email"><button title="hint: sample@email.com">i</button><br>
            </td>
        </tr>
        <tr>
            <td>
                Gender
            </td>
            <td>
                <input type="radio" name="Gender" value="male">Male  
                <input type="radio" name="Gender" value="female">Female  
                <input type="radio" name="Gender" value="other">Other <br>
            </td>
        </tr>
        <tr>
            <td>
                Date of Birth
            </td>
            <td>
                <input type="text" name="dd" value="dd" maxlength="2" size="1">/
                <input type="text" name="mm" value="mm" maxlength="2"size ="1">/
                <input type="text" name="yyyy" value="yyyy" maxlength="4" size="1"><br>
            </td>
        </tr>
        <tr>
            <td>
                Blood Group
            </td>
            <td>
              <select name="bg">
              <option value="A+">A+</option> 
              <option value="A-">A-</option> 
              <option value="B+">B+</option> 
              <option value="B-">B-</option> 
              <option value="AB+">AB+</option> 
              <option value="AB-">AB-</option> 
              </select>
            </td>
        </tr>
        <tr>
            <td>
                Degree
            </td>
            <td>
                <input type="checkbox" name="Degree" value="ssc">SSC 
                <input type="checkbox" name="Degree" value="hsc">HSC 
                <input type="checkbox" name="Degree" value="bsc">BSc <br>
            </td>
        </tr>
        <tr>
            <td>
                Photo
            </td>
            <td>
                <input type="file" name="Picture">
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <button>Submit</button> 
                <button>Reset</button>
            </td>
        </tr>
    </table>
</body>
</html>
