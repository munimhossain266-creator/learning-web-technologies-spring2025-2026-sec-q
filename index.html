<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-container">
        <h1>Product Management</h1>
        
        <div class="product-details">
            <div class="form-group">
                <label>Product Name:</label>
                <span class="static-value">Premium Widget</span>
            </div>

            <div class="form-group">
                <label>Unit Price ($):</label>
                <span class="static-value" id="unit-price">1000</span>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" placeholder="0" min="0">
                <small id="error-msg">Value cannot be negative</small>
            </div>

            <div class="form-group result-group">
                <label for="total-price">Total Price ($):</label>
                <input type="text" id="total-price" value="0" readonly>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
